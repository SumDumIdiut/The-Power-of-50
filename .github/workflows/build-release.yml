name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      run: python build_exe.py

    - name: Get version from tag
      id: get_version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: The Power of 50 ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## The Power of 50 — ${{ steps.get_version.outputs.VERSION }}

          ### Games:
          - Snake
          - Shooter

          ### Download:
          Download `ThePowerOf50.exe` below and run it — no installation required.

          ### System Requirements:
          - Windows 10/11
        files: dist/ThePowerOf50.exe
        draft: false
        prerelease: false
